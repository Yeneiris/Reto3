<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tienda de Café</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <h1>Tienda de Café ☕</h1>
</header>

<button id="btnCarrito">
    🛒 <span id="contador">0</span>
</button>

<div id="carrito">
    <h2>Carrito</h2>
    <div id="listaCarrito"></div>
    <h3 id="total">Total: $0</h3>
</div>

<section class="container">

    <div class="producto">
        <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93" alt="">
        <h3>Café Colombiano</h3>
        <p>$20000</p>
        <button onclick="agregarCarrito('Café Colombiano', 20000)">Agregar</button>
    </div>

    <div class="producto">
        <img src="https://images.unsplash.com/photo-1511920170033-f8396924c348" alt="">
        <h3>Café Espresso</h3>
        <p>$25000</p>
        <button onclick="agregarCarrito('Café Espresso', 25000)">Agregar</button>
    </div>

    <div class="producto">
        <img src= "https://images.unsplash.com/photo-1498804103079-a6351b050096" alt="">
        <h3>Café Orgánico</h3>
        <p>$30000</p>
        <button onclick="agregarCarrito('Café Orgánico', 30000)">Agregar</button>
    </div>

</section>

<footer>
    <p>© 2026 Tienda de Café</p>
</footer>

<script src="script.js"></script>
</body>
</html>
